<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>toolkit - Programmer's Daily Toolkit</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="favicon.ico" />
  </head>
  <body>
    <nav class="nav">
      <div class="container nav__inner">
        <a href="index.html" class="nav__brand">toolkit</a>
        <ul class="nav__links">
          <li><a href="index.html" class="nav__link">Tools</a></li>
        </ul>
      </div>
    </nav>

    <main class="container" style="padding-top: 64px; padding-bottom: 80px">
      <div style="text-align: center; margin-bottom: 48px">
        <h1 style="margin-bottom: 16px">Programmer's Daily Toolkit</h1>
        <p
          style="
            font-family: var(--font-serif);
            font-size: 1.2rem;
            color: rgba(38, 37, 30, 0.55);
          "
        >
          简洁、高效的开发者工具集
        </p>
      </div>

      <div class="tools-grid">
        <a href="tools/json-xml-formatter/index.html" class="tool-card">
          <h3 class="tool-card__title">JSON / XML Formatter</h3>
          <p class="tool-card__desc">
            格式化、压缩 JSON 和 XML，支持语法高亮和树形视图
          </p>
        </a>
        <a href="tools/timestamp-tool/index.html" class="tool-card">
          <h3 class="tool-card__title">Timestamp Tool</h3>
          <p class="tool-card__desc">
            获取当前时间戳、时间戳与日期互相转换
          </p>
        </a>
        <a href="tools/websocket-debugger/index.html" class="tool-card">
          <h3 class="tool-card__title">WebSocket Debugger</h3>
          <p class="tool-card__desc">
            WebSocket 连接调试工具，支持自动重连和心跳
          </p>
        </a>
        <a href="tools/stream-player/index.html" class="tool-card">
          <h3 class="tool-card__title">FLV Player</h3>
          <p class="tool-card__desc">
            FLV 流媒体播放器，支持实时流播放
          </p>
        </a>
        <a href="tools/text-diff/index.html" class="tool-card">
          <h3 class="tool-card__title">Text Diff</h3>
          <p class="tool-card__desc">
            对比两段文本的差异，支持字符级高亮
          </p>
        </a>
      </div>
    </main>

    <footer
      class="container"
      style="
        text-align: center;
        padding: 24px 0;
        border-top: 1px solid var(--border-primary);
      "
    >
      <p style="font-size: 0.81rem; color: rgba(38, 37, 30, 0.55)">
        toolkit · Built with warm minimalism
      </p>
    </footer>
  </body>
</html>
